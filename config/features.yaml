# murkml Model Configuration
# THE single source of truth for feature lists, hyperparameters, and transform settings.
#
# History:
#   v11 (legacy): 137 features — train_tiered.py never applied optimized_drop_list.txt
#   v11_golden_master: This file — reproduces legacy 137-feature behavior exactly
#   v12 (future): ~95 curated features — Phase 5 of the zero-regression refactor
#
# To change the model: edit THIS file, then retrain. Nowhere else.

version: "v11_golden_master"

