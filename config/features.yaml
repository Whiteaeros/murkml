# === Monotone constraints (physics: more turbidity = more sediment) ===
monotone_constraints:
  - turbidity_instant
  - turbidity_mean_1hr
  - turbidity_min_1hr
  - turbidity_max_1hr

# === Metadata columns (never features) ===
exclude_cols:
  - site_id
  - sample_time
  - lab_value
  - match_gap_seconds
  - window_count
  - is_nondetect
  - hydro_event
  - ssc_log1p
  - ssc_value
  - total_phosphorus_log1p
  - nitrate_nitrite_log1p
  - orthophosphate_log1p
  - tds_evaporative_log1p

# === CatBoost hyperparameters (locked after HP sweep 2026-04-02) ===
catboost:
  depth: 6
  learning_rate: 0.05
  l2_leaf_reg: 3
  iterations: 500
  early_stopping_rounds: 50
  boosting_type: Plain
  random_seed: 42
  thread_count: 5

# === Transform (locked after sweep 2026-03-28) ===
transform:
  type: boxcox
  lambda: 0.2

# === Unit documentation (declarative, not runtime-enforced in Phase 4) ===
units:
  turbidity: FNU
  discharge: CFS
  conductance: uS/cm
  temperature: degC
  dissolved_oxygen: mg/L
  ph: standard_units
  ssc: mg/L
